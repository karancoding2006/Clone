<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo">
                </div>
            </div>

            <div class="address border">
                <p class="add-first">Deliver To</p>
                <div class="address-icon">
                    <i class="fas fa-map-marker-alt"></i>
                    <p class="add-sec">India</p>
                </div>
            </div>

            <div class="nav-search border">
                <select name="search-category" class="search-select" title="Search category" aria-label="Search category">
                    <option value="">All</option>
                </select>
                <input type="text" placeholder="Search Amazon.in" class="search-input">
                <div class="search-icon ">
                    <i class="fas fa-search"></i>
                </div>
            </div>

            <div class="nav-sigin border">
                <p><span>Hello, Sign in</span></p>
                <p class="nav-sec">Accounts & lists</p>
            </div>

            <div class="nav-return border">
                <p><span>Returns</span></p>
                <p class="nav-sec">&Orders</p>
            </div>

            <div class="nav-cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                <p class="cart">Cart</p>
            </div>

        </div>
    </header>

    
</body>
</html>
